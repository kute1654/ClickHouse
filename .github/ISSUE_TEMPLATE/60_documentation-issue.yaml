name: Documentation issue
description: Report something incorrect or missing in documentation
labels: ["comp-documentation"]
body:
  - type: markdown
    attributes:
      value: |
        > Thanks for helping us improve the documentation! Please describe what's wrong, missing, or unclear below. If you opened this from the "Raise issue" button on the docs site, the page you were viewing is filled in for you; otherwise, please add a link to the affected page.
  - type: input
    id: page
    attributes:
      label: Documentation page
      description: The documentation page this issue is about. Pre-filled when the issue is opened from the "Raise issue" button on the docs site.
    validations:
      required: false
  - type: textarea
    attributes:
      label: Company or project name
      description: Put your company name or project description here.
    validations:
      required: false
  - type: textarea
    attributes:
      label: Describe the issue
      description: A clear and concise description of what's wrong in documentation.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
    validations:
      required: false
